[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
via_ir = true
fs_permissions = [{ access = "read-write", path = "./deployments" }]

[fuzz]
runs = 1000

[invariant]
runs = 512
depth = 50

[rpc_endpoints]
xlayer = "${XLAYER_RPC_URL}"

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
