name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  contracts:
    name: Contracts and tooling
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Check Solidity formatting
        run: forge fmt --check

      - name: Build contracts
        run: forge build

      - name: Run Forge tests with fuzzing
        run: forge test --fuzz-runs 10000

      - name: Run invariant tests
        run: forge test --match-path 'test/invariant/*'

      - name: Run guarded fork tests
        run: forge test --match-path 'test/fork/*'

      - name: Type-check TypeScript
        run: npx tsc --noEmit

      - name: Install Slither
        run: python3 -m pip install slither-analyzer

      - name: Run Slither
        run: slither src --exclude-informational --exclude-low
